# Point at a model you run yourself. The runner needs network access to it, so
# this needs a self-hosted runner unless your endpoint is reachable publicly.
#
# api-key is required by the action but most local servers ignore it — any
# placeholder works.
name: commitreview (local model)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: self-hosted
    steps:
      - uses: dymoo/commitreview@v1
        with:
          api-key: not-used
          base-url: http://10.0.0.20:8000/v1
          model: Qwen/Qwen3-Coder-30B-A3B-Instruct
          # Smaller local models do fewer things well: keep the context tight,
          # skip response_format, and let the refute pass drop the noise.
          json-mode: off
          chunk-tokens: 12000
          context-lines: 10
          max-findings: 10
