name: commitreview
description: Context-aware AI code review on pull requests. Bring your own OpenAI-compatible endpoint.
author: commitreview contributors

branding:
  icon: git-pull-request
  color: purple

inputs:
  api-key:
    description: API key for the OpenAI-compatible endpoint. Pass a secret, never a literal.
    required: true
  base-url:
    description: Base URL of the OpenAI-compatible API, including its version path.
    required: true
  model:
    description: Model id as the provider names it.
    required: true
  github-token:
    description: Token used to read the pull request and post comments.
    required: false
    default: ${{ github.token }}
  instructions:
    description: Extra repository-specific review guidance.
    required: false
    default: ''
  ignore:
    description: Newline-separated path globs added to the built-in ignore list.
    required: false
    default: ''

outputs:
  findings:
    description: Number of findings that survived verification.
  reviewed:
    description: 'true when a review ran; false when the event did not request one.'

runs:
  using: node20
  main: src/index.js
